<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>💰 Welcome Budget Boss 👑</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0e11; 
            color: white;
            transition: 0.5s;
            overflow-x: hidden;
        }

        /* LOGIN PAGE */
        #loginPage {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
        }

        .login-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00f2fe;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
        }

        .login-box input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        .login-box button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: #00f2fe;
            font-weight: bold;
            cursor: pointer;
        }

        /* APP LAYOUT */
        #app { display: none; }

        .sidebar {
            width: 230px;
            height: 100vh;
            position: fixed;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0, 242, 254, 0.3);
        }

        .sidebar h2 { text-align: center; color: #00f2fe; margin-top: 20px; }

        .sidebar button {
            width: 90%;
            margin: 10px auto;
            display: block;
            padding: 12px;
            background: transparent;
            color: white;
            border: 1px solid transparent;
            text-align: left;
            padding-left: 20px;
            cursor: pointer;
            border-radius: 8px;
        }

        .sidebar button:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: #00f2fe;
        }

        .content { margin-left: 250px; padding: 40px; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid #00f2fe;
        }

        input, select { padding: 10px; border-radius: 5px; border: none; margin: 5px; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 1px solid #00f2fe; padding: 10px; color: #00f2fe; }
        td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn-delete {
            background: none;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4d4d;
            color: white;
        }

        /* CHART */
        .chart-container {
            width: 100%;
            max-width: 450px;
            height: 450px;
            margin: auto;
        }

        .btn-add {
            background: #00f2fe;
            color: black;
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="loginPage">
    <div class="login-box">
        <h2>💰 Welcome Budget Boss 👑</h2>
        <input type="text" placeholder="👤 Username">
        <input type="password" placeholder="🔒 Password">
        <br><br>
        <button onclick="login()">Login🚀</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h2>💎 Budget Pro</h2>
        <button onclick="showSection('dashboard')">📊 Dashboard</button>
        <button onclick="showSection('transactions')">💳 Transactions</button>
        <button onclick="showSection('reports')">📈 Reports</button>
        <button onclick="showSection('settings')">⚙ Settings</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>

    <div class="content">
        <div id="dashboard">
            <h2>📊 Financial Overview 💡</h2>
            <div class="card">
                <h3>💵 Current Balance: <span id="balance" style="color:#00f2fe">₹ 0</span></h3>
            </div>
            <div class="card">
                <h3 style="text-align: center;">Item-Wise Breakdown</h3>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div id="transactions" style="display:none;">
            <h2>💳 Manage Transactions 📝</h2>
            <div class="card">
                <input type="number" id="amount" placeholder="Amount">
                <select id="type">
                    <option value="Income">Income 💰</option>
                    <option value="Expense">Expense 💸</option>
                </select>
                <input type="text" id="category" placeholder="Item Name (Food, Rent, etc.)">
                <button class="btn-add" onclick="addTransaction()">Add Item➕</button>
            </div>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>💵Amount</th>
                            <th>💰Category</th>
                            <th>📂Item</th>
                            <th>📌Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableData"></tbody>
                </table>
            </div>
        </div>

        <div id="reports" style="display:none;">
            <h2>📈 Financial Reports 📊</h2>
            <div class="card">
                <h3 style="color:#00ffcc">💰 Total Income: ₹ <span id="totalIncome">0</span></h3>
                <h3 style="color:salmon">💸 Total Expense: ₹ <span id="totalExpense">0</span></h3>
            </div>
        </div>

        <div id="settings" style="display:none;">
            <h2>⚙ Customize Theme 🎨</h2>
            <div class="card">
                <h3>🎨 Customize UI</h3>
                <button class="btn-add" onclick="changeTheme('dark')" style="margin:5px">🌙 Midnight</button>
                <button class="btn-add" onclick="changeTheme('sunset')" style="margin:5px; background: orange;">🌅 Sunset</button>
                <button class="btn-add" onclick="changeTheme('purple')" style="margin:5px; background: #9d50bb;">💜 Royal</button>
            </div>
        </div>
    </div>
</div>

<script>
    let balance = 0;
    let transactions = [];
    let chart;
    let categoryTotals = {};
    let categoryColors = {};

    const brightPalette = ['#00FFCC', '#FF007F', '#CCFF00', '#7F00FF', '#FFD700', '#007FFF', '#FF4500', '#39FF14'];
    let colorIdx = 0;

    const emojiMap = {
        'food': '🍕', 'rent': '🏠', 'salary': '💰', 'travel': '✈️', 
        'gym': '💪', 'shopping': '🛍️', 'movie': '🎬', 'health': '🏥'
    };

    function getEmoji(name) {
        let n = name.toLowerCase();
        for (let key in emojiMap) { if(n.includes(key)) return emojiMap[key]; }
        return '🔹';
    }

    function login() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";
        setTimeout(initChart, 100);
    }

    function logout() { location.reload(); }

    function showSection(id) {
        document.querySelectorAll('.content > div').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function addTransaction() {
        let amt = parseFloat(document.getElementById("amount").value);
        let type = document.getElementById("type").value;
        let nameInput = document.getElementById("category").value.trim();

        if (!amt || !nameInput) return alert("Fill all fields!");

        let catWithEmoji = getEmoji(nameInput) + " " + nameInput;
        
        // Save transaction with a unique ID (timestamp) to find it later for deletion
        let transaction = { id: Date.now(), amt, type, name: catWithEmoji };
        transactions.push(transaction);

        updateDataAndUI();
        
        document.getElementById("amount").value = "";
        document.getElementById("category").value = "";
    }

    function deleteTransaction(id) {
        // Find the transaction and remove it
        transactions = transactions.filter(t => t.id !== id);
        updateDataAndUI();
    }

    function updateDataAndUI() {
        // Reset totals
        balance = 0;
        categoryTotals = {};
        
        // Recalculate everything from current transactions array
        transactions.forEach(t => {
            if (t.type === "Income") balance += t.amt;
            else balance -= t.amt;

            if (!categoryTotals[t.name]) {
                categoryTotals[t.name] = 0;
                if (!categoryColors[t.name]) {
                    categoryColors[t.name] = brightPalette[colorIdx % brightPalette.length];
                    colorIdx++;
                }
            }
            categoryTotals[t.name] += t.amt;
        });

        updateUI();
    }

    function updateUI() {
        document.getElementById("balance").innerText = "₹ " + balance.toLocaleString();
        
        let inc = transactions.filter(t => t.type === "Income").reduce((s, t) => s + t.amt, 0);
        let exp = transactions.filter(t => t.type === "Expense").reduce((s, t) => s + t.amt, 0);
        document.getElementById("totalIncome").innerText = inc.toLocaleString();
        document.getElementById("totalExpense").innerText = exp.toLocaleString();

        let table = document.getElementById("tableData");
        table.innerHTML = "";
        transactions.forEach(t => {
            table.innerHTML += `<tr>
                <td>₹ ${t.amt}</td>
                <td style="color:${t.type==='Income'?'#00ffcc':'#ff4d4d'}">${t.type}</td>
                <td>${t.name}</td>
                <td><button class="btn-delete" onclick="deleteTransaction(${t.id})">🗑️ Delete</button></td>
            </tr>`;
        });

        if(chart) {
            chart.data.labels = Object.keys(categoryTotals);
            chart.data.datasets[0].data = Object.values(categoryTotals);
            chart.data.datasets[0].backgroundColor = Object.keys(categoryTotals).map(k => categoryColors[k]);
            chart.update();
        }
    }

    function initChart() {
        const ctx = document.getElementById("pieChart").getContext('2d');
        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [],
                    borderColor: '#000',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: 'white', font: { size: 14 } }
                    }
                }
            }
        });
    }

    function changeTheme(mode) {
        const body = document.body.style;
        if (mode === "sunset") {
            body.background = "linear-gradient(135deg,#42275a,#734b6d)";
        } else if (mode === "purple") {
            body.background = "linear-gradient(135deg,#0f0c29,#302b63,#24243e)";
        } else {
            body.background = "#0b0e11";
        }
    }
</script>

</body>
</html>
